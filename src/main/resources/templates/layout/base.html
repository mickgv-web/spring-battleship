<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(title)">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title th:text="${title}">Battleships</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/game.css}">

</head>


<body>


<header th:fragment="header" class="app-header">

    <div class="nav-container">

        <div class="app-title">
            <a th:href="@{/}">BATTLESHIPS</a>
        </div>


        <!-- USER AREA -->

        <div class="nav-user" th:if="${#authentication != null}">

            <span class="nav-username">
                <span th:text="${#authentication.name}"></span>
            </span>

            <form method="post" th:action="@{/logout}" class="logout-form">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <button class="btn btn-secondary nav-logout">
                    Logout
                </button>

            </form>

        </div>

    </div>

</header>



<div th:fragment="layout(content)" class="app-container">

    <div th:replace="layout/base :: header"></div>

    <main>

        <div th:replace="${content}"></div>

    </main>

    <footer class="app-footer">
        Battleships Demo · Spring Boot · WebSockets
    </footer>

</div>

</body>
</html>
