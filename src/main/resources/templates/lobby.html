<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Lobby')}"></head>

<body>

<div th:replace="~{layout/base :: layout(~{::section})}">

    <section class="lobby">

        <!-- CREATE GAME PANEL -->

        <div class="panel lobby-create">

            <div class="panel-title">
                Create New Game
            </div>

            <p class="panel-description">
                Start a new naval battle and wait for an opponent.
            </p>

            <form method="post" th:action="@{/games/create}">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <button class="btn btn-primary">
                    Create Game
                </button>

            </form>

        </div>



        <!-- OPEN GAMES -->

        <div class="panel lobby-list">

            <div class="panel-title">
                Open Games
            </div>

            <div class="game-list">

                <div th:each="game : ${games}" class="game-card">

                    <div class="game-info">

                        <div class="game-code">
                            Game <span th:text="${game.code}"></span>
                        </div>

                        <div class="game-meta">

                        <span>
                            Host:
                            <strong th:text="${game.host.username}"></strong>
                        </span>

                            <span class="game-status"
                                  th:text="${game.status}">
                        </span>

                        </div>

                    </div>

                    <form method="post" th:action="@{/games/join}">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <input type="hidden"
                               name="code"
                               th:value="${game.code}" />

                        <button class="btn btn-join">
                            Join
                        </button>

                    </form>

                </div>

                <div th:if="${#lists.isEmpty(games)}" class="empty-lobby">

                    No open games available

                </div>

            </div>

        </div>



        <!-- FOOTER ACTION -->

        <div class="lobby-footer">

            <a th:href="@{/logout}" class="btn btn-secondary">
                Logout
            </a>

        </div>

    </section>

</div>

</body>
</html>
